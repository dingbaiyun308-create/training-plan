const STORE_KEY = 'training_plan_xlsx_aligned_v1';
const state = loadState();
function loadState(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||{checks:{},fields:{},weightKg:70}}catch{return{checks:{},fields:{},weightKg:70}}}
function saveState(){localStorage.setItem(STORE_KEY,JSON.stringify(state));renderKpis()}
function checked(id){return Boolean(state.checks[id])} function setChecked(id,v){state.checks[id]=v;saveState()} function field(id,f=''){return state.fields[id]??f} function setField(id,v){state.fields[id]=v;saveState()} function pct(d,t){return t?Math.round(d/t*100):0} function h(t){return String(t??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
function init(){document.getElementById('title').textContent=DATA.title;weekFilter.innerHTML=DATA.weeks.map(w=>`<option value="${h(w)}">${h(w)}</option>`).join('');dayFilter.innerHTML=['全部',...DATA.days].map(d=>`<option value="${h(d)}">${h(d)}</option>`).join('');weekFilter.addEventListener('change',renderAll);dayFilter.addEventListener('change',renderAll);document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>switchTab(btn.dataset.tab)));exportBtn.addEventListener('click',exportBackup);importBtn.addEventListener('click',()=>importFile.click());importFile.addEventListener('change',importBackup);renderAll()}
function switchTab(tab){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id===tab))}
function selectedWeek(){return weekFilter.value||DATA.weeks[0]} function selectedDay(){return dayFilter.value||'全部'} function visible(x){return x.week===selectedWeek()&&(selectedDay()==='全部'||x.day===selectedDay())}
function renderAll(){renderKpis();renderOverview();renderTraining();renderWarmup();renderRules()}
function renderKpis(){const trainIds=[];DATA.training.forEach(ex=>{for(let i=1;i<=ex.sets;i++)trainIds.push(`set:${ex.id}:${i}`)});const warmIds=DATA.warmups.map(w=>`warm:${w.id}`);const visTrain=[];DATA.training.filter(visible).forEach(ex=>{for(let i=1;i<=ex.sets;i++)visTrain.push(`set:${ex.id}:${i}`)});const visWarm=DATA.warmups.filter(visible).map(w=>`warm:${w.id}`);const items=[['总训练组',trainIds.filter(checked).length,trainIds.length],['总热身项',warmIds.filter(checked).length,warmIds.length],[`${selectedWeek()}训练`,visTrain.filter(checked).length,visTrain.length],[`${selectedWeek()}热身`,visWarm.filter(checked).length,visWarm.length]];kpis.innerHTML=items.map(([label,done,total])=>`<div class="card kpi"><div class="label">${h(label)}</div><div class="num">${done} / ${total}</div><div class="progress"><div class="bar" style="width:${pct(done,total)}%"></div></div></div>`).join('')}
function renderOverview(){const kg=Number(state.weightKg||70);const params=DATA.params.map(p=>`<div class="soft param"><b>${h(p.label)}</b><span>${h(p.value)}</span></div>`).join('');const nutrition=DATA.nutrition.map(n=>`<div class="nutrition-row"><b>${h(n.item)}</b><span>${n.low}–${n.high} g/kg</span><span><b>${Math.round(kg*n.low)}–${Math.round(kg*n.high)} g/天</b></span><span class="muted">${h(n.note)}</span></div>`).join('');const reminders=DATA.reminders.map(r=>`<div class="soft amber">${h(r)}</div>`).join('');const refs=DATA.refs.map(r=>r.url?`<li><a href="${h(r.url)}" target="_blank" rel="noreferrer">${h(r.text)}</a></li>`:`<li>${h(r.text)}</li>`).join('');overview.innerHTML=`<div class="card"><h2>可编辑参数</h2><div class="param-list" style="margin-top:12px">${params}</div></div><div class="card"><h2>每日营养目标</h2><p class="muted" style="margin-top:6px">按体重自动换算。默认 70 kg，可改。</p><div style="margin-top:12px"><label>体重 kg <input id="weightInput" type="number" min="30" max="200" value="${kg}" /></label></div><div style="margin-top:12px">${nutrition}</div></div><div class="grid two"><div class="card"><h2>本周提醒</h2><div class="grid" style="margin-top:12px">${reminders}</div></div><div class="card refs"><h2>参考原则/来源</h2><ul>${refs}</ul></div></div>`;weightInput.addEventListener('input',e=>{state.weightKg=e.target.value;saveState();renderOverview()})}
function groupByDay(items){const map=new Map();items.forEach(x=>{const key=`${x.day}｜${x.type}`;if(!map.has(key))map.set(key,[]);map.get(key).push(x)});return[...map.entries()]}
function renderTraining(){const items=DATA.training.filter(visible);training.innerHTML=groupByDay(items).map(([key,rows])=>`<div class="card day-card"><div class="day-head"><h2>${h(selectedWeek())} · ${h(key)}</h2><span class="badge">${rows.length} 个动作</span></div>${rows.map(exerciseHtml).join('')}</div>`).join('')||'<div class="card">没有找到对应训练。</div>';bindTraining()}
function exerciseHtml(ex){const setChecks=Array.from({length:ex.sets},(_,i)=>{const n=i+1,id=`set:${ex.id}:${n}`;return`<label class="check"><input type="checkbox" data-check="${id}" ${checked(id)?'checked':''}>组${n}</label>`}).join('');const fields=['实际重量','实际次数','当晚入睡','第二天状态','备注'];const fieldHtml=fields.map(label=>{const id=`field:${ex.id}:${label}`;return`<label><span class="muted">${label}</span><input type="text" data-field="${id}" value="${h(field(id))}" /></label>`}).join('');return`<div class="exercise"><div class="exercise-top"><div><div class="exercise-name">${h(ex.exercise)}</div><div class="muted">${h(ex.type)}</div></div><div><b>${h(ex.weight)}</b><div class="muted">建议工作重量</div></div><div><b>${h(ex.sets)} 组</b></div><div><b>${h(ex.reps)}</b><div class="muted">次数/时间</div></div><div><b>${h(ex.rpe)}</b><div class="muted">目标RPE</div></div></div><div class="sets">${setChecks}</div><div class="notes-grid">${fieldHtml}</div></div>`}
function bindTraining(){document.querySelectorAll('[data-check]').forEach(el=>el.addEventListener('change',e=>setChecked(e.target.dataset.check,e.target.checked)));document.querySelectorAll('[data-field]').forEach(el=>el.addEventListener('input',e=>setField(e.target.dataset.field,e.target.value)))}
function renderWarmup(){const items=DATA.warmups.filter(visible);warmup.innerHTML=groupByDay(items).map(([key,rows])=>`<div class="card day-card"><div class="day-head"><h2>${h(selectedWeek())} · ${h(key)}</h2><span class="badge">${rows.length} 项</span></div>${rows.map(w=>{const id=`warm:${w.id}`;return`<label class="warmup"><div><div class="warmup-title">${h(w.module)}</div><div class="muted">${h(w.day)} · ${h(w.type)}</div></div><div>${h(w.content)}</div><span class="check"><input type="checkbox" data-check="${id}" ${checked(id)?'checked':''}>完成</span></label>`}).join('')}</div>`).join('')||'<div class="card">没有找到对应热身。</div>';document.querySelectorAll('[data-check]').forEach(el=>el.addEventListener('change',e=>setChecked(e.target.dataset.check,e.target.checked)))}
function renderRules(){rules.innerHTML=Object.entries(DATA.rules).map(([title,rows])=>{const head=rows[0]||[],body=rows.slice(1);return`<div class="card"><h2>${h(title)}</h2><div class="rule-table" style="margin-top:12px">${head.length?`<div class="rule-row rule-head">${head.map(c=>`<div class="rule-cell">${h(c)}</div>`).join('')}</div>`:''}${body.map(r=>`<div class="rule-row">${r.map(c=>`<div class="rule-cell">${h(c)}</div>`).join('')}</div>`).join('')}</div></div>`}).join('')}
function exportBackup(){const blob=new Blob([JSON.stringify({app:'4周恢复训练打勾表',exportedAt:new Date().toISOString(),state},null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='4周恢复训练备份.json';a.click();setTimeout(()=>URL.revokeObjectURL(url),1000)}
function importBackup(e){const file=e.target.files&&e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const payload=JSON.parse(reader.result);Object.assign(state,payload.state||payload);saveState();renderAll();alert('导入完成')}catch{alert('导入失败：请选择本网页导出的 JSON 文件')}};reader.readAsText(file)}
init();
</script>
