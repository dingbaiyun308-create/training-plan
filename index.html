const STORE_KEY = 'stage2_3plus1_training_plan_v1';
const state = loadState();
function loadState(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||{checks:{},fields:{},profile:{weightKg:85}}}catch{return{checks:{},fields:{},profile:{weightKg:85}}}}
function saveState(){localStorage.setItem(STORE_KEY,JSON.stringify(state));renderKpis()}
function h(t){return String(t??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
function checked(id){return !!state.checks[id]} function setChecked(id,v){state.checks[id]=v;saveState()} function field(id,f=''){return state.fields[id]??f} function setField(id,v){state.fields[id]=v;saveState()} function pct(d,t){return t?Math.round(d/t*100):0}
function toast(msg){status.textContent=msg;status.classList.add('show');setTimeout(()=>status.classList.remove('show'),2200)}
function init(){title.textContent=DATA.title;weekFilter.innerHTML=DATA.weeks.map(w=>`<option value="${w}">第${w}周</option>`).join('');dayFilter.innerHTML=['全部',...DATA.days].map(d=>`<option value="${h(d)}">${h(d)}</option>`).join('');weekFilter.addEventListener('change',renderAll);dayFilter.addEventListener('change',renderAll);document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));exportBtn.addEventListener('click',exportBackup);importBtn.addEventListener('click',()=>importFile.click());importFile.addEventListener('change',importBackup);renderAll();if('serviceWorker' in navigator && location.protocol!=='file:'){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}}
function switchTab(tab){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id===tab))}
function week(){return Number(weekFilter.value||DATA.weeks[0])} function day(){return dayFilter.value||'全部'} function visible(x){return x.week===week()&&(day()==='全部'||x.day===day())}
function renderAll(){renderKpis();renderOverview();renderTraining();renderWarmup();renderRecovery();renderPullup()}
function allSetIds(items=DATA.training){const ids=[];items.forEach(ex=>{for(let i=1;i<=ex.sets;i++)ids.push(`set:${ex.id}:${i}`)});return ids}
function renderKpis(){const all=allSetIds(), vis=allSetIds(DATA.training.filter(visible)), req=allSetIds(DATA.training.filter(x=>x.required)), warm=DATA.warmups.map(w=>`warm:${w.id}`);const recReq=DATA.recovery.filter(r=>r.required);const items=[['总训练组',all.filter(checked).length,all.length],['当前筛选',vis.filter(checked).length,vis.length],['必做日完成',recReq.filter(r=>checked(`rec-done:${r.id}`)).length,recReq.length],['热身腰背',warm.filter(checked).length,warm.length]];kpis.innerHTML=items.map(([label,done,total])=>`<div class="card kpi"><div class="label">${h(label)}</div><div class="num">${done} / ${total}</div><div class="progress"><div class="bar" style="width:${pct(done,total)}%"></div></div></div>`).join('')}
function renderOverview(){const params=DATA.params.map(p=>`<div class="soft"><b>${h(p.label)}</b><div>${h(p.value)}</div></div>`).join('');const decHead=['指标','绿色：按计划','黄色：降档','红色：停止','下一步'];const dec=`<div class="matrix decision"><div class="row head">${decHead.map(x=>`<div class="cell">${h(x)}</div>`).join('')}</div>${DATA.decisions.map(r=>`<div class="row"><div class="cell"><b>${h(r.item)}</b></div><div class="cell">${h(r.green)}</div><div class="cell">${h(r.yellow)}</div><div class="cell">${h(r.red)}</div><div class="cell">${h(r.next)}</div></div>`).join('')}</div>`;const prog=`<div class="matrix progression"><div class="row head">${DATA.progressionHeaders.map(x=>`<div class="cell">${h(x)}</div>`).join('')}</div>${DATA.progression.map(r=>`<div class="row">${r.map(c=>`<div class="cell">${h(c)}</div>`).join('')}</div>`).join('')}</div>`;overview.innerHTML=`<div class="card"><h2>个人参数与周安排</h2><div class="kv" style="margin-top:12px">${params}</div></div><div class="card"><h2>决策规则</h2><div style="margin-top:12px">${dec}</div></div><div class="card"><h2>顶组与进阶</h2><div style="margin-top:12px">${prog}</div></div>`}
function groupSessions(items){const map=new Map();items.forEach(x=>{const key=`${x.day}｜${x.focus}｜${x.requiredText}`;if(!map.has(key))map.set(key,[]);map.get(key).push(x)});return[...map.entries()]}
function renderTraining(){const items=DATA.training.filter(visible).sort((a,b)=>a.day.localeCompare(b.day,'zh')||a.order-b.order);training.innerHTML=groupSessions(items).map(([key,rows])=>{const [d,focus,req]=key.split('｜');return`<div class="card day-card"><div class="day-head"><div><h2>第${week()}周 · ${h(d)}</h2><p class="muted">${h(focus)}</p></div><span class="badge ${req==='可选'?'optional':''}">${h(req)} · ${rows.length} 项</span></div>${rows.map(exerciseHtml).join('')}</div>`}).join('')||'<div class="card">没有找到对应训练。</div>';bindInputs(training)}
function exerciseHtml(ex){const setChecks=Array.from({length:ex.sets},(_,i)=>{const n=i+1,id=`set:${ex.id}:${n}`;return`<label class="check"><input type="checkbox" data-check="${id}" ${checked(id)?'checked':''}>第${n}组</label>`}).join('');const fields=['实际重量','实际次数','疼痛/异常','备注'];const fhtml=fields.map(label=>{const id=`field:${ex.id}:${label}`;return`<label><span class="muted">${label}</span><input type="text" data-field="${id}" value="${h(field(id))}"></label>`}).join('');return`<div class="exercise"><div class="exercise-top"><span class="badge stage">${h(ex.stage)}</span><div><div class="exercise-name">${h(ex.exercise)}</div><div class="muted">顺序 ${ex.order}</div></div><div><b>${h(ex.load)}</b><div class="muted">目标重量/负荷</div></div><div><b>${ex.sets}组</b><div class="muted">${h(ex.reps)}</div></div><div><b>${h(ex.intensity)}</b><div class="muted">强度要求</div></div></div><div class="sets">${setChecks}</div><div class="fields">${fhtml}</div></div>`}
function bindInputs(root=document){root.querySelectorAll('[data-check]').forEach(el=>el.addEventListener('change',e=>setChecked(e.target.dataset.check,e.target.checked)));root.querySelectorAll('[data-field]').forEach(el=>el.addEventListener('input',e=>setField(e.target.dataset.field,e.target.value)))}
function renderWarmup(){const html=DATA.warmups.map(w=>{const id=`warm:${w.id}`;return`<div class="warm"><div><b>${h(w.applies)}</b><div class="muted">顺序 ${w.order}</div></div><div><b>${h(w.action)}</b><div class="muted">${h(w.dose)}</div></div><div>${h(w.purpose)}</div><div>${h(w.feel)}</div><div class="muted">降档：${h(w.downgrade)}</div><label class="check"><input type="checkbox" data-check="${id}" ${checked(id)?'checked':''}>完成</label></div>`}).join('');warmup.innerHTML=`<div class="card"><h2>专项热身与腰背稳定</h2><p class="muted" style="margin-top:6px">不占地面版本。出现降档条件时，不要硬顶。</p><div class="grid" style="margin-top:12px">${html}</div></div>`;bindInputs(warmup)}
function renderRecovery(){const rows=DATA.recovery.filter(r=>r.week===week());recovery.innerHTML=`<div class="card"><h2>恢复与身体状态追踪</h2><p class="muted" style="margin-top:6px">周日是可选技术日，跳过不算失败。腰背次日比训练前高 ≥2 分时，建议降档。</p><div class="grid" style="margin-top:12px">${rows.map(recoveryHtml).join('')}</div></div><div class="card"><h2>KPI 说明</h2><div class="grid two" style="margin-top:12px">${DATA.recoveryKpis.map(k=>`<div class="soft"><b>${h(k.metric)}</b><div>目标：${h(k.target)}</div><div class="muted">${h(k.note)}</div></div>`).join('')}</div></div>`;bindInputs(recovery)}
function recoveryHtml(r){const done=`rec-done:${r.id}`;const labels=['训练前腰背0–10','训练后腰背0–10','次日腰背0–10','入睡时间','次日精力1–5','肩肘痛0–10','疱疹前驱','备注'];return`<div class="recovery-row"><b>第${r.week}周</b><b>${h(r.day)}</b><span class="badge ${r.required?'':'optional'}">${h(r.requiredText)}</span><label class="check"><input type="checkbox" data-check="${done}" ${checked(done)?'checked':''}>完成</label>${labels.map(label=>{const id=`rec:${r.id}:${label}`;return`<label><span class="muted">${label}</span><input type="text" data-field="${id}" value="${h(field(id,label==='疱疹前驱'?'无':''))}"></label>`}).join('')}</div>`}
function renderPullup(){const labels=['体重kg','高位下拉8次重量','高位下拉6次重量','坐姿划船10次重量','海豹卧拉8次重量','离心最长秒数','肩胛引体次数','悬垂秒数','自重尝试','备注'];const weekRows=DATA.pullWeeks.map(w=>`<div class="pull-row"><b>第${w.week}周</b>${labels.map(label=>{const id=`pull:${w.week}:${label}`;return`<label><span class="muted">${label}</span><input type="text" data-field="${id}" value="${h(field(id,label==='体重kg'?w.weight:''))}"></label>`}).join('')}</div>`).join('');const tests=DATA.pullTests.map(t=>{const current=`pull-test:${t.id}:current`, ok=`pull-test:${t.id}:ok`;return`<div class="test-row"><b>${h(t.metric)}</b><div>${h(t.target)}</div><label><span class="muted">当前成绩</span><input type="text" data-field="${current}" value="${h(field(current))}"></label><label><span class="muted">是否达标</span><select data-field="${ok}"><option ${field(ok,t.defaultAchieved)==='否'?'selected':''}>否</option><option ${field(ok,t.defaultAchieved)==='是'?'selected':''}>是</option></select></label><div class="muted">${h(t.note)}</div></div>`}).join('');pullup.innerHTML=`<div class="card"><h2>首个标准引体进度追踪</h2><div class="grid" style="margin-top:12px">${weekRows}</div></div><div class="card"><h2>测试前参考目标</h2><div class="grid" style="margin-top:12px">${tests}</div></div>`;bindInputs(pullup);pullup.querySelectorAll('select[data-field]').forEach(el=>el.addEventListener('change',e=>setField(e.target.dataset.field,e.target.value)))}
function exportBackup(){const blob=new Blob([JSON.stringify({app:'第2阶段训练计划器',version:1,exportedAt:new Date().toISOString(),state},null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='第2阶段训练计划备份.json';a.click();setTimeout(()=>URL.revokeObjectURL(url),1000);toast('备份已导出')}
function importBackup(e){const file=e.target.files&&e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const payload=JSON.parse(reader.result);Object.assign(state,payload.state||payload);saveState();renderAll();toast('导入完成')}catch{toast('导入失败：请选择本程序导出的 JSON')}};reader.readAsText(file)}
init();
</script>
</body>
</html>
